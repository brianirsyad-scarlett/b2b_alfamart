name: Daily Report (1 AM WIB)

on:
  schedule:
    - cron: '0 18 * * *'   # 18:00 UTC = 01:00 WIB next day
  workflow_dispatch:        # allow manual trigger

jobs:
  run-daily:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install selenium webdriver-manager pyotp

      - name: Run daily report script
        run: python report_daily.py
        env:
          TOTP_SECRET: ${{ secrets.TOTP_SECRET }}

      - name: Upload downloaded files
        uses: actions/upload-artifact@v4
        with:
          name: daily-reports
          path: /tmp/downloads/
          retention-days: 7
