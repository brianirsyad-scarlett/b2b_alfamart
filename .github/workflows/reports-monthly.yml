name: Monthly Report (Daily at 1 AM WIB)

on:
  schedule:
    - cron: '0 18 * * *'   # 18:00 UTC = 01:00 WIB next day
  workflow_dispatch:

jobs:
  run-monthly:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install selenium webdriver-manager pyotp

      - name: Run monthly report script
        run: python reports_monthly.py
        env:
          TOTP_SECRET: ${{ secrets.TOTP_SECRET }}

      - name: Upload downloaded reports
        uses: actions/upload-artifact@v4
        with:
          name: monthly-reports
          path: /tmp/downloads/
